name: AI Orchestration Gate

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build request payload
        run: |
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD)
          jq -n \
            --arg diff "$DIFF" \
            --arg title "${{ github.event.pull_request.title }}" \
            --arg desc "${{ github.event.pull_request.body || '' }}" \
            '{diff: $diff, prTitle: $title, prDescription: $desc}' \
            > /tmp/payload.json

      - name: Call AI Orchestration gate
        run: |
          curl -sf --max-time 300 \
            -X POST "http://${{ secrets.GCP_INSTANCE_IP }}:8080/api/orchestrate" \
            -H "Content-Type: application/json" \
            -d @/tmp/payload.json \
            -o /tmp/response.json

      - name: Post gate report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const response = JSON.parse(fs.readFileSync('/tmp/response.json', 'utf8'));
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: response.markdownReport
            });

      - name: Fail pipeline if REJECTED
        run: |
          DECISION=$(jq -r '.decision' /tmp/response.json)
          echo "AI Gate decision: $DECISION"
          [ "$DECISION" = "APPROVED" ] || exit 1
