name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'orchestration-service/**'
      - '.github/workflows/deploy.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./orchestration-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Deploy to GCP e2-micro
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_INSTANCE_IP }}
          username: ${{ secrets.GCP_USERNAME }}
          key: ${{ secrets.GCP_SSH_KEY }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull ghcr.io/${{ github.repository }}:latest
            docker stop orchestration-service 2>/dev/null || true
            docker rm   orchestration-service 2>/dev/null || true
            docker run -d \
              --name orchestration-service \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /opt/harness/secrets.env \
              ghcr.io/${{ github.repository }}:latest
